name: Feature request
description: Propose an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: user_problem
    attributes:
      label: User problem (non-technical perspective)
      description: What is hard for non-technical editors today?
    validations:
      required: true
  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior
      description: Describe expected user-visible behavior and API/UI changes.
    validations:
      required: true
  - type: textarea
    id: success_criteria
    attributes:
      label: Success criteria
      description: How should we validate this works end-to-end?
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Relevant package(s)
      placeholder: "@webmaster-droid/web, @webmaster-droid/server"
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches?
