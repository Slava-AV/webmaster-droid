name: Bug report
description: Report a reproducible defect in webmaster-droid
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Briefly describe the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands/code paths if possible.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Affected package
      placeholder: "@webmaster-droid/admin-ui"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0-alpha.2"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "Node 20.x, npm 10.x, macOS/Linux, framework version"
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, or linked repro repository.
