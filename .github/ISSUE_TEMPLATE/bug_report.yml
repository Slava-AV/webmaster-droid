name: Bug report
description: Report a reproducible defect in webmaster-droid
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: user_request
    attributes:
      label: What did the user ask for?
      description: Quote or summarize the plain-language request.
      placeholder: "Example: Make the homepage hero title shorter and friendlier."
    validations:
      required: true
  - type: input
    id: target_section
    attributes:
      label: Which page or section was targeted?
      placeholder: "Example: pages.home.hero.title"
    validations:
      required: true
  - type: textarea
    id: expected_result
    attributes:
      label: What result was expected?
      placeholder: "Describe the expected draft or live behavior."
    validations:
      required: true
  - type: textarea
    id: actual_result
    attributes:
      label: What happened instead?
      placeholder: "Describe the actual behavior, errors, or unexpected output."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands/code paths if possible.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Ask ...
        4. Observe ...
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Affected package
      placeholder: "@webmaster-droid/web"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0-alpha.2"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "Node 20.x, npm 10.x, macOS/Linux, framework version"
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, or linked repro repository.
