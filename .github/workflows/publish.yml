name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package name (e.g. @webmaster-droid/web)"
        required: true
        type: choice
        options:
          - "@webmaster-droid/contracts"
          - "@webmaster-droid/web"
          - "@webmaster-droid/server"
          - "@webmaster-droid/cli"
      tag:
        description: "npm dist-tag"
        required: true
        default: "alpha"
        type: string
      dry_run:
        description: "Run npm publish in dry-run mode"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Ensure Linux Optional Binaries
        run: npm install --no-save @rollup/rollup-linux-x64-gnu @parcel/watcher-linux-x64-glibc

      - name: Build selected package
        run: npm run build --workspace "${{ inputs.package }}"

      - name: Typecheck selected package
        run: npm run typecheck --workspace "${{ inputs.package }}"

      - name: Publish (dry-run)
        if: ${{ inputs.dry_run }}
        run: npm publish --workspace "${{ inputs.package }}" --tag "${{ inputs.tag }}" --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: npm publish --workspace "${{ inputs.package }}" --tag "${{ inputs.tag }}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
